name: Build HeatSMP

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Find and build
        run: |
          cd $(find . -name "pom.xml" | head -1 | xargs dirname)
          mvn clean package
      - uses: actions/upload-artifact@v4
        with:
          name: HeatSMP
          path: "**/target/HeatSMP-1.0.0.jar"
